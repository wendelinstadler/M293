    <main>
      <section class="seiten-inhalt">
        <h1>Kontaktformular</h1>
        <form action="https://gibm.becknet.ch/formular/formular.php" method="post">

    <label for="name">Name: *</label>
    <input type="text" id="name" name="name"
      required minlength="2" maxlength="50"
      placeholder="Max Mustermann" autofocus />

    <fieldset>
      <legend>Geschlecht: *</legend>
      <label><input type="radio" name="geschlecht" value="divers" required /> Divers</label>
      <label><input type="radio" name="geschlecht" value="maennlich" /> Männlich</label>
      <label><input type="radio" name="geschlecht" value="weiblich" /> Weiblich</label>
    </fieldset>

    <label for="email">E-Mail: *</label>
    <input type="email" id="email" name="email"
      required placeholder="beispiel@email.com" />

    <label for="telefon">Telefon:</label>
    <input type="tel" id="telefon" name="telefon"
      placeholder="+41 79 123 45 67"
      pattern="[\+]?[0-9\s\-]{7,20}" />

    <label for="alter">Alter: *</label>
    <input type="number" id="alter" name="alter"
      required min="1" max="120" placeholder="18" />

    <label for="geburtsdatum">Geburtsdatum: *</label>
    <input type="date" id="geburtsdatum" name="geburtsdatum" required />
    
    <label for="passwort">Passwort: *</label>
    <input type="password" id="passwort" name="passwort"
    required minlength="8" maxlength="32"
    placeholder="Mind. 8 Zeichen"
    pattern=".{8,}"
    title="Mind. 8 Zeichen" />

    <label for="website">Website:</label>
    <input type="url" id="website" name="website"
      placeholder="https://beispiel.ch" />

    <label for="betreff">Betreff: *</label>
    <select id="betreff" name="betreff" required>
      <option value="">Bitte wählen</option>
      <option value="privat">Privat</option>
      <option value="problem">Problem mit der Website</option>
      <option value="zusammenarbeit">Zusammenarbeit</option>
    </select>

    <fieldset>
      <legend>Wie haben Sie mich gefunden?</legend>
      <label><input type="checkbox" name="gefunden" value="google" /> Google</label>
      <label><input type="checkbox" name="gefunden" value="instagram" /> Instagram</label>
      <label><input type="checkbox" name="gefunden" value="empfehlung" /> Empfehlung</label>
      <label><input type="checkbox" name="gefunden" value="andere" /> Andere</label>
    </fieldset>

    <label for="userid">Benutzer-ID:</label>
    <input type="text" id="userid" name="userid"
      value="USR-00142" readonly />

    <label for="newsletter">Newsletter (derzeit nicht verfügbar):</label>
    <input type="text" id="newsletter" name="newsletter"
      value="Nicht verfügbar" disabled />

    <label for="nachricht">Nachricht: *</label>
    <textarea id="nachricht" name="nachricht"
      rows="5" required
      minlength="10" maxlength="1000"
      placeholder="Schreiben Sie Ihre Nachricht hier..."></textarea>

    <div class="agb-row">
      <input id="AGB" type="checkbox" name="AGB" required />
      <label for="AGB">Ich akzeptiere die AGB *</label>
    </div>

    <button type="submit">Absenden</button>

</form>
      </section>
    </main>

          <circle cx="17" cy="7" r="1" fill="white"/>
        </svg>
      </a>
    </footer>
  </body>
