  </head>
  <body>
    <header>
      <div class="header-container">
        <h1 class="Header-titel">Wendelin Stadler</h1>
        <nav>
          <ul>
            <li><a href="Index.html">Home</a></li>

          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="seiten-inhalt">
        <h1>Kontaktformular</h1>
        <form
          action="https://gibm.becknet.ch/formular/formular.php"
          method="post"
        >
          <label for="name">Name: *</label><br />
          <input type="text" id="name" name="name" required/>
          
          <fieldset class="geschlecht-row">
            <legend>Geschlecht: *</legend>
            <label><input type="radio" name="geschlecht" value="divers" required /> Divers</label>
            <label><input type="radio" name="geschlecht" value="maennlich" /> Männlich</label>
            <label><input type="radio" name="geschlecht" value="weiblich" /> Weiblich</label>
          </fieldset>

          <br /><br />

          <label for="email">E-Mail: *</label><br />
          <input type="email" id="email" name="email" required/>
          <br /><br />

          <label for="betreff">Betreff: *</label><br />
          <select id="betreff" name="betreff" required>
            <option value="">Bitte wählen</option>
            <option value="privat">Privat</option>
            <option value="problem">Problem mit der Website</option></select
          ><br /><br />

          <label for="nachricht">Nachricht: *</label><br />
          <textarea id="nachricht" name="nachricht" rows="5" required></textarea
          ><br /><br />

          <div class="agb-row">
            <input id="AGB" type="checkbox" name="AGB" required />
            <label for="AGB" class="agb-label">Ich akzeptiere die <a href="AGB.html" target="_blank">AGB</a></label>
          </div>
          <br />

          <button type="submit">Absenden</button>
        </form>
      </section>
    </main>
    <footer class="footer">
      <a href="https://www.instagram.com/wendelin.sd?igsh=MThsbjZrcmdmazY5aw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
          <defs>
            <linearGradient id="insta-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#f09433"/>
              <stop offset="25%" style="stop-color:#e6683c"/>
              <stop offset="50%" style="stop-color:#dc2743"/>
              <stop offset="75%" style="stop-color:#cc2366"/>
              <stop offset="100%" style="stop-color:#bc1888"/>
            </linearGradient>
          </defs>
          <rect width="24" height="24" rx="6" fill="url(#insta-gradient)"/>
          <rect x="4" y="4" width="16" height="16" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" fill="none" stroke="white" stroke-width="1.5"/>
          <circle cx="17" cy="7" r="1" fill="white"/>
        </svg>
      </a>
    </footer>
