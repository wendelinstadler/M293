<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt</title>
    <link rel="stylesheet" href="CSS.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1 class="Header-titel">Wendelin Stadler</h1>
        <nav>
          <ul>
            <li><a href="Index.html">Home</a></li>
            <li><a href="Steckbrief.html">Steckbrief</a></li>
            <li><a href="Lebenslauf.html">Lebenslauf</a></li>
            <li><a href="Kontakt.html">Kontakt</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="kontakt">
        <h2>Kontaktformular</h2>
        <form action="#" method="post">
          <label for="name">Name:</label><br />
          <input type="text" id="name" name="name" required /><br /><br />

          <label for="email">E-Mail:</label><br />
          <input type="email" id="email" name="email" required /><br /><br />

          <label for="betreff">Betreff:</label><br />
          <select id="betreff" name="betreff" required>
            <option value="">Bitte wählen</option>
            <option value="privat">Privat</option>
            <option value="problem">Problem mit der Website</option>
          </select><br /><br />

          <label for="nachricht">Nachricht:</label><br />
          <textarea id="nachricht" name="nachricht" rows="5" required></textarea
          ><br /><br />

          <button type="submit">Absenden</button>
        </form>
      </section>
    </main>
    <footer class="footer">
      <p>Lorem ipsum dolor</p>
    </footer>
  </body>
</html>
